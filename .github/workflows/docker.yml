name: docker

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Every package's tests and typechecks, in dependency order (ui/shared's
  # built dist is consumed by the three apps via file:../shared). The image
  # is only published when this passes.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            cli/package-lock.json
            ui/shared/package-lock.json
            ui/member/package-lock.json
            ui/admin/package-lock.json
            ui/operator/package-lock.json

      - name: ui/shared
        working-directory: ui/shared
        run: |
          npm ci
          npm run build
          npm test

      - name: server
        working-directory: server
        run: |
          npm ci
          npm run build
          npm test

      - name: cli
        working-directory: cli
        run: |
          npm ci
          npm run --if-present build
          npm test

      - name: ui/member
        working-directory: ui/member
        run: |
          npm ci
          npm run build
          npm test

      - name: ui/admin
        working-directory: ui/admin
        run: |
          npm ci
          npm run build
          npm test

      - name: ui/operator
        working-directory: ui/operator
        run: |
          npm ci
          npm run build
          npm test

  # The full-lifecycle demo doubles as an end-to-end test: real server,
  # real CLI, throwaway database, every step must succeed (set -e).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            cli/package-lock.json

      - name: install
        run: |
          (cd server && npm ci)
          (cd cli && npm ci)

      - name: demo lifecycle
        run: PORT=18620 bash scripts/demo.sh

  build-and-push:
    if: github.event_name != 'pull_request'
    needs: [test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
